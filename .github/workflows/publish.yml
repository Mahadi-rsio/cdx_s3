name: Build & Release Caddy Plugin

on:
  push:
    tags:
      - "v*.*.*"        # v1.0.0, v1.2.3 — release build
  push:
    branches:
      - main            # main-এ push হলে latest tag দিয়ে build
  workflow_dispatch:    # Manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # mahadi-rsio/cdx_s3

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ১. Code checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # ২. QEMU — multi-platform build এর জন্য (arm64 support)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ৩. Docker Buildx setup
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ৪. GHCR login
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ৫. Image tags & labels তৈরি
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch push → latest
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag push → version number
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Commit SHA (always)
            type=sha,prefix=sha-

      # ৬. Build & Push (cache সহ)
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha          # GitHub Actions cache থেকে layer নাও
          cache-to: type=gha,mode=max   # সব layer cache করো

      # ৭. Summary
      - name: Image digest
        run: |
          echo "### ✅ Published to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build-push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
